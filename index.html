<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>강의 트래커</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="강의 트래커">
<meta name="theme-color" content="#2D5A3D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--border:#E2E0D8;--border-strong:#C8C5BC;
  --text:#1A1917;--text-muted:#7A7872;--text-faint:#B0ADA6;
  --accent:#2D5A3D;--accent-light:#E8F2EC;--accent-mid:#4A8A5E;
  --today-border:#2D5A3D;--today-bg:#F0F7F3;
  --radius:10px;--radius-sm:6px;
  --shadow-lg:0 8px 28px rgba(0,0,0,.13);
}
body.dark{
  --bg:#141412;--surface:#1E1D1A;--border:#2E2D29;--border-strong:#403E38;
  --text:#F0EEE8;--text-muted:#8A8880;--text-faint:#504E48;
  --accent:#5AAF76;--accent-light:#1A2E20;--accent-mid:#4A8A5E;
  --today-border:#5AAF76;--today-bg:#162019;
  --shadow-lg:0 8px 28px rgba(0,0,0,.35);
}
/* 시스템 다크모드는 수동 설정 없을 때만 적용 */
@media(prefers-color-scheme:dark){body:not(.light):not(.dark){
  --bg:#141412;--surface:#1E1D1A;--border:#2E2D29;--border-strong:#403E38;
  --text:#F0EEE8;--text-muted:#8A8880;--text-faint:#504E48;
  --accent:#5AAF76;--accent-light:#1A2E20;--accent-mid:#4A8A5E;
  --today-border:#5AAF76;--today-bg:#162019;
  --shadow-lg:0 8px 28px rgba(0,0,0,.35);
}}
/* 헤더 우측 컨트롤 */
.hd-controls{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--bg);border-color:var(--border-strong);color:var(--text)}
/* 언어 선택 드롭다운 */
.lang-wrap{position:relative}
.lang-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .15s}
.lang-btn:hover{background:var(--bg);border-color:var(--border-strong);color:var(--text)}
.lang-panel{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;min-width:130px;padding:4px;display:none}
.lang-panel.open{display:block}
.lang-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;color:var(--text);transition:background .1s;border:none;background:none;width:100%;font-family:inherit;text-align:left}
.lang-opt:hover{background:var(--bg)}
.lang-opt.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.lang-flag{font-size:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-.02em}
.logo span{color:var(--text-muted);font-weight:400}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--bg);border-color:var(--border-strong)}
.btn svg{width:14px;height:14px;flex-shrink:0}
main{max-width:1200px;margin:0 auto;padding:28px 20px 40px;min-height:calc(100vh - 56px);display:flex;flex-direction:column}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;flex-shrink:0}
.week-info{display:flex;align-items:center;gap:10px}
.week-title{font-size:18px;font-weight:600;letter-spacing:-.03em;min-width:80px}
.week-range{font-size:12px;color:var(--text-muted)}
.nav-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .15s;flex-shrink:0}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn svg{width:16px;height:16px}
.today-btn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-muted);transition:all .15s}
.today-btn:hover{background:var(--bg);color:var(--text)}
.summary{margin-bottom:20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.summary-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text-muted)}
.summary-chip .dot{width:7px;height:7px;border-radius:50%}
.summary-count{font-family:'DM Mono',monospace;color:var(--text)}
/* ── 그리드 레이아웃 ── */
.grid{display:grid;gap:8px;flex:1;grid-template-columns:repeat(7,minmax(0,1fr));align-content:stretch}
.day-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 10px;
  display:flex;flex-direction:column;gap:8px;
  min-height:0; /* 고정 min-height 제거 — 화면에 맞게 */
}

/* 태블릿 / 폴드 펼침 (가로 800px 이상, 세로가 긴 경우) */
/* ── 반응형 레이아웃 — JS가 grid-cols 클래스 동적 적용 ── */
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid.cols-7{grid-template-columns:repeat(7,minmax(0,1fr))}

/* 가로 모드 소형 폰 UI 축소 */
.landscape-small main{padding:8px 12px 10px}
.landscape-small .week-nav{margin-bottom:6px}
.landscape-small .summary{margin-bottom:6px}
.landscape-small .grid{gap:4px}
.landscape-small .day-card{padding:6px 4px;gap:3px}
.landscape-small .day-num{font-size:13px!important}
.landscape-small .tag{padding:2px 4px;font-size:9px}
.landscape-small .add-btn{padding:3px 4px;font-size:9px}

/* 아주 작은 폰 */
@media(max-width:360px){
  .day-card{padding:8px 6px}
}
.day-card.today{border-color:var(--today-border);background:var(--today-bg);border-width:1.5px}
.day-head{display:flex;align-items:baseline;justify-content:space-between}
.day-name{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.day-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.day-card.today .day-num{color:var(--accent)}
.tags-wrap{display:flex;flex-direction:column;gap:3px;flex:1}
.tag{display:flex;align-items:flex-start;gap:4px;padding:4px 7px;border-radius:var(--radius-sm);font-size:10px;font-weight:500;line-height:1.4}
.tag-text{flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tag-del{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;opacity:.4;color:inherit;flex-shrink:0;margin-top:1px}
.tag-del:hover{opacity:1}
.add-wrap{position:relative;margin-top:auto}
.add-btn{width:100%;padding:5px 8px;background:none;border:1px dashed var(--border-strong);border-radius:var(--radius-sm);font-family:inherit;font-size:11px;color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.add-btn:hover{background:var(--bg);color:var(--text-muted);border-style:solid}
.add-btn svg{width:12px;height:12px}

/* ── Dropdown panel ── */
.dp{
  position:fixed; /* fixed so it's never clipped by overflow:hidden parents */
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:400;width:300px;
  display:none;flex-direction:column;overflow:hidden;
  max-height:90vh; /* JS에서 동적으로 덮어씀 */
}
.dp.open{display:flex}

/* search bar at top */
.dp-search-bar{
  display:flex;align-items:center;gap:6px;
  padding:10px 12px 8px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.dp-search-bar input{
  flex:1;padding:5px 8px;font-size:12px;font-family:inherit;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);outline:none;
}
.dp-search-bar input:focus{border-color:var(--accent-mid)}
.dp-search-clear{background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:16px;line-height:1;padding:0;flex-shrink:0;display:none}
.dp-search-clear.show{display:block}

/* scrollable content area */
.dp-scroll{overflow-y:auto;flex:1}

/* course accordion inside dropdown */
.dp-course{border-bottom:1px solid var(--border)}
.dp-course:last-child{border-bottom:none}
.dp-course-head{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;cursor:pointer;
  transition:background .12s;
  user-select:none;
}
.dp-course-head:hover{background:var(--bg)}
.dp-course-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dp-course-label{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.dp-course-meta{font-size:10px;color:var(--text-muted);font-weight:400}
.dp-course-arrow{font-size:10px;color:var(--text-faint);transition:transform .2s;flex-shrink:0}
.dp-course-head.open .dp-course-arrow{transform:rotate(180deg)}

/* episode list under each course */
.dp-ep-list{display:none;padding:4px 0 6px}
.dp-ep-list.open{display:block}
.dp-ep-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:6px 12px 6px 30px;cursor:pointer;
  transition:background .1s;
}
.dp-ep-item:hover{background:var(--bg)}
.dp-ep-item.checked{background:var(--accent-light)}

/* custom checkbox */
.ep-cb{
  width:15px;height:15px;border-radius:3px;
  border:1.5px solid var(--border-strong);
  background:var(--surface);flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;pointer-events:none;
}
.dp-ep-item.checked .ep-cb{
  background:var(--accent);border-color:var(--accent);
}
.ep-cb-tick{color:#fff;font-size:10px;display:none;line-height:1}
.dp-ep-item.checked .ep-cb-tick{display:block}
.ep-label{font-size:11px;color:var(--text);line-height:1.45;flex:1}
.ep-num-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-faint);flex-shrink:0;margin-top:3px;min-width:18px}

/* footer */
.dp-footer{
  padding:8px 12px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.dp-sel-label{flex:1;font-size:11px;color:var(--accent);font-weight:500}
.dp-footer button{
  padding:6px 12px;font-family:inherit;font-size:12px;font-weight:500;
  border-radius:var(--radius-sm);cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  transition:all .15s;
}
.dp-footer button:hover{background:var(--bg)}
.dp-confirm{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.dp-confirm:hover{background:var(--accent-mid)!important;border-color:var(--accent-mid)!important}

/* ── Calendar popup ── */
.cal-popup{
  position:fixed;z-index:450;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  width:280px;padding:14px;display:none;flex-direction:column;gap:10px;
}
.cal-popup.open{display:flex}
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:6px}
.cal-month-label{font-size:14px;font-weight:600;color:var(--text);flex:1;text-align:center}
.cal-nav{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.cal-nav:hover{background:var(--bg)}
.cal-nav svg{width:14px;height:14px}
.cal-daynames{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dn{font-size:10px;font-weight:600;color:var(--text-faint);text-align:center;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;border-radius:var(--radius-sm);cursor:pointer;
  color:var(--text);transition:background .1s;border:none;background:none;
  font-family:'DM Mono',monospace;
}
.cal-cell:hover{background:var(--bg)}
.cal-cell.other-month{color:var(--text-faint)}
.cal-cell.today{background:var(--accent-light);color:var(--accent);font-weight:700}
.cal-cell.in-week{background:var(--accent-light)}
.cal-cell.today.in-week{background:var(--accent);color:#fff}
.cal-cell.has-record::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:3px;left:50%;transform:translateX(-50%)}
.cal-cell{position:relative}
.cal-foot{display:flex;justify-content:center}
.cal-today-btn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-muted)}
.cal-today-btn:hover{background:var(--bg);color:var(--text)}
.week-title-btn{
  background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;
  font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.03em;
  padding:3px 8px;border-radius:var(--radius-sm);transition:background .15s;
  display:flex;align-items:center;gap:5px;
}
.week-title-btn:hover{background:var(--border)}
.week-title-btn svg{width:13px;height:13px;color:var(--text-muted);flex-shrink:0}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:15px;font-weight:600}
.modal-x{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.modal-x:hover{background:var(--bg)}
.modal-x svg{width:14px;height:14px}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px}
.modal-tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-body{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.modal-body.hidden{display:none}
.course-section{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:2px}
.course-section-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);cursor:pointer;font-size:13px;font-weight:600}
.course-section-head:hover{background:var(--border)}
.cs-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:none;cursor:pointer;transition:transform .15s}
.cs-dot:hover{transform:scale(1.3)}
.cs-name{flex:1}
.cs-cnt{font-size:11px;color:var(--text-muted);font-weight:400}
.cs-del{background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:16px;padding:2px 4px}
.cs-del:hover{color:#E24B4A}
.cs-edit{background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:12px;padding:2px 6px;border-radius:var(--radius-sm);font-family:inherit}
.cs-edit:hover{background:var(--border);color:var(--text)}
.ep-list-modal{display:none;border-top:1px solid var(--border)}
.ep-list-modal.open{display:block}
.ep-list-inner{padding:6px 10px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ep-row-m{display:flex;align-items:flex-start;gap:6px;padding:4px 6px;border-radius:var(--radius-sm);group}
.ep-row-m:hover{background:var(--bg)}
.ep-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-faint);flex-shrink:0;min-width:22px;margin-top:3px}
.ep-text{flex:1;font-size:12px;color:var(--text);line-height:1.5;word-break:break-all}
.ep-text-input{flex:1;font-size:12px;font-family:inherit;padding:2px 6px;border:1px solid var(--accent-mid);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;line-height:1.5}
.ep-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.ep-row-m:hover .ep-actions{opacity:1}
.ep-act-btn{background:none;border:none;cursor:pointer;width:22px;height:22px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:13px}
.ep-act-btn:hover{background:var(--border);color:var(--text)}
.ep-act-btn.del:hover{color:#E24B4A}
.ep-add-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border)}
.ep-add-row input{flex:1;font-size:12px;font-family:inherit;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none}
.ep-add-row input:focus{border-color:var(--accent-mid)}
.ep-add-row button{padding:5px 10px;font-family:inherit;font-size:12px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;white-space:nowrap}
.ep-add-row button:hover{background:var(--accent-mid)}
.ep-drag{cursor:grab;color:var(--text-faint);font-size:13px;padding:0 2px;flex-shrink:0;user-select:none;margin-top:2px}
.ep-drag:active{cursor:grabbing}
.ep-row-m.dragging{opacity:.4;background:var(--accent-light)}
.ep-row-m.drag-over{border-top:2px solid var(--accent)}
.course-section-head.open .cs-arrow{transform:rotate(180deg)}
.add-form{border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px}
.add-form label{font-size:12px;font-weight:500;color:var(--text-muted)}
.add-form input,.add-form textarea{width:100%;padding:7px 10px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;resize:vertical;margin-top:4px}
.add-form input:focus,.add-form textarea:focus{border-color:var(--accent-mid)}
.add-form textarea{min-height:80px;font-size:11px;line-height:1.5}
.hint{font-size:11px;color:var(--text-faint)}
.cp{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cp-opt{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;outline:none}
.cp-opt:hover{transform:scale(1.2)}
.cp-opt.active{border-color:var(--text)}
.form-acts{display:flex;gap:8px;justify-content:flex-end}
.form-acts button{padding:7px 16px;font-family:inherit;font-size:12px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.form-acts .bs{background:var(--accent);color:#fff;border-color:var(--accent)}
.form-acts .bs:hover{background:var(--accent-mid)}
.tip{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--text);color:var(--bg);
  font-size:12px;font-weight:500;line-height:1.5;
  padding:6px 10px;border-radius:var(--radius-sm);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  max-width:260px;word-break:keep-all;
  opacity:0;transition:opacity .15s;
  white-space:pre-wrap;
}
.tip.show{opacity:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--bg);font-size:13px;font-weight:500;padding:9px 18px;border-radius:999px;box-shadow:var(--shadow-lg);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<body>

<script>
const PAL=[
  {bg:'#E8F5EE',text:'#1A5C35',dot:'#2E9E5B'},
  {bg:'#E6F1FB',text:'#0D4A8A',dot:'#2A7FD4'},
  {bg:'#EEEDFE',text:'#3A2FAA',dot:'#6B62D6'},
  {bg:'#FDF0E0',text:'#7A4500',dot:'#D4860A'},
  {bg:'#FDE8E8',text:'#8A1F1F',dot:'#CC3333'},
  {bg:'#FBE8F2',text:'#852054',dot:'#C94080'},
  {bg:'#EAF3E0',text:'#2E5E12',dot:'#558B2F'},
  {bg:'#FAF0E6',text:'#7A3010',dot:'#C2561A'},
];
const DAYS=['월','화','수','목','금','토','일'];

const DEFAULTS=[{id:1,name:'스페인어 초급 문법',ci:0,episodes:["1강_Part 1/2. 주의해야 할 스페인어 발음 (DELE A1)","1강_Part 2/2. 주의해야 할 스페인어 강세 (DELE A1)","2강_Part 1/5. 명사의 성별 I (사람) *DELE A1","2강_Part 2/5. 명사의 성별 II (일반)","2강_Part 3/5. 명사의 복수형 (DELE A1)","2강_Part 4/5. 관사: 정관사 & 부정관사 (DELE A1)","2강_Part 5/5. 형용사 & 성수일치 (DELE A1)","3강_Part 1/3. 주격인칭대명사 +SER동사 형태 (DELE A1)","3강_Part 2/3. 기본문장구조 (DELE A1)","3강_Part 3/3. Ser de~출신, 원산지, 재료 표현 (DELE A1)","4강_Part 1/2. ESTAR 동사 형태 및 상태표현 (DELE A1)","4강_Part 2/2. SER & ESTAR 비교 (DELE A1)","5강_Part 1/3. ESTAR 위치 표현 & 위치표현 부사구 (DELE A1)","5강_Part 2/3. 축약형 al•del, 전치격 (DELE A1)","5강_Part 3/3. Hay 동사 '~있다' (DELE A1)","6강_Part 1/4. 지시대명사&형용사 (DELE A1)","6강_Part 2/4. 중성지시대명사 (DELE A1)","6강_Part 3/4. 의문사 (DELE A1)","6강_Part 4/4. 감탄문I (DELE A1)","7강_Part 1/4. 소유표현 전치사 DE & 소유 질문 (DELE A1)","7강_Part 2/4. 소유 형용사(소유격) I : 전치형 (DELE A1)","7강_Part3/4. 소유 형용사(소유격) II : 후치형 (DELE A1)","7강_Part4/4. 소유대명사 (DELE A1)","8강_Part 1/6. 동사기본형 & -ar형 동사 현재 규칙 (DELE A1)","8강_Part 2/6. -ar형 규칙 동사 + bien/mal/mucho (DELE A1)","8강_Part 3/6. 다양한 -ar형 규칙동사 + 문장만들기 & 파생어휘 (DELE A1)","8강_Part 4/6. 유용한 -ar형 규칙동사들 (DELE A1)","8강_Part 5/6. 의문사 + -ar형 규칙동사 (DELE A1)","8강_Part 6/6. -AR형 규칙동사 정리문제 (DELE A1)","9강_Part 1/5. -er형 동사 현재 규칙 (DELE A1)","9강_Part 2/5. 부사 만들기 (DELE A1)","9강_Part 3/5. 빈도 표현 (DELE A1)","9강_Part 4/5. -ir형 동사 현재 규칙 (DELE A1)","9강_Part 5/5. -ER/-IR형 현재 규칙동사 정리문제 (DELE A1)","10강_Part 1/5. 현재동사 불규칙 I : ser,estar,ir & Yo 불규칙I (DELE A1)","10강_Part 2/5. Yo [-go] 현재 불규칙 동사 (DELE A1)","10강_Part 3/5. 현재 강세불규칙 동사","10강_Part 4/5. IR동사 [가다] & 이동동사 +A+동사원형 (DELE A1)","10강_Part 5/5. 현재동사 불규칙 I 정리문제 (DELE A1)","11강_Part 1/7. PODER ~할 수 있다(o-ue 모음불규칙)(DELE A1)","11강_Part 2/7. O→UE 모음불규칙 동사들 (DELE A1)","11강_Part 3/7. Querer동사 & E→IE 모음불규칙 동사 (DELE A1)","11강_Part 4/7. E→I 모음불규칙 동사 (DELE A1)","11강_Part 5/7. jugar동사 & jugar al 표현 (DELE A1)","11강_Part 6/7. 현재 철자불규칙 & -y-불규칙 동사 (DELE A1)","11강_Part 7/7. 현재동사 불규칙 II 정리문제 (DELE A1)","12강_Part 1/6. IR A +동사원형 ~할 것이다 [가까운 미래] (DELE A1)","12강_Part 2/6. aprender/empezar/volver A+동사원형","12강_Part 3/6. poder+동사원형: ~할 수 있다 / saber+동사원형: ~할 줄 알다 (DELE A1)","12강_Part 4/6. querer+동사원형: ~하고 싶다 / soler+동사원형: 늘 ~하다 (DELE A1)","12강_Part 5/6. dejar/acabar/tratar de+동사원형 (DELE A1)","12강_Part 6/6. 동사결합표현 정리문제 (DELE A1)","13강_Part 1/6. 다양한 의무 표현 [ Tener que~/Deber~/Hay que~ ] (DELE A1)","13강_Part 2/6. [ deber 의 여러가지 의미 ] (DELE A1+A2)","13강_Part 3/6. [ Hace ~que 구문 : ~한 지 ~기간이 되었다 ] (DELE A1)","13강_Part 4/6. [ hace & 날씨 표현 ] (DELE A1)","13강_Part 5/6. 감탄문 II (DELE A2/B1)","13강_Part 6/6. 정리문제 [의무표현/Hace~que구문/날씨] (DELE A1)","14강_Part 1/7. 숫자 0~29 (DELE A1)","14강_Part 2/7. 숫자 30~1000 (DELE A1)","14강_Part 3/7. 숫자 읽기 주의할 점: 십+y+일 / uno (DELE A1)","14강_Part 4/7. 숫자 읽기 주의할 점: 100 / 백단위(200~900) (DELE A1)","14강_Part 5/7. 서수 (1~10), *primero/tercero (DELE A1)","14강_Part 6/7. 요일&날짜, 생일 & 생년월일 문답 (DELE A1)","14강_Part 7/7. 숫자 읽기 연습 (DELE A1)","15강_Part 1/7. 시간 질문 \"몇 시예요?\" (DELE A1)","15강_Part 2/7. 시간 읽기 I (DELE A1)","15강_Part 3/7. 시간 읽기 II (DELE A1)","15강_Part 4/7. 다양한 시간 표현 (DELE A1)","15강_Part 5/7. 요일 표현 (DELE A1)","15강_Part 6/7. 다양한 때 표현 (DELE A1)","15강_Part 7/7. 시간 표현 정리문제 [작문] (DELE A1)","16강_Part 1/5. 비교급: ~보다 더/덜~ 하다 (DELE : A1)","16강_Part 2/5. 최상급 : ~에서/~중에 가장 ~하다 (DELE : A1)","16강_Part 3/5. 동등 비교 : ~만큼 ~하다 (DELE : A1)","16강_Part 4/5. tanto~como~표현: ~뿐만 아니라 ~도","16강_Part 5/5. 비교급 정리문제 (DELE A1)","17강_Part 1/4. CONOCER동사 (DELE : A1)","17강_Part 2/4. SABER: 알다/~맛이 나다 (DELE : A1)","17강_Part 3/4. 절대최상급 -ísimo/a (DELE : A1)","17강_Part 4/4. 정리문제: Saber & Conocer / 절대최상급 (DELE A1)","18강_Part 1/4. 전치사 A 용법 / A+사람 (DELE : A1)","18강_Part 2/4. 직접목적격대명사 형태 (DELE : A1)","18강_Part 3/4. 직접목적격대명사 기본 어순 & 예외 (DELE : A1)","18강_Part 4/4. 직접목적격대명사 정리문제 (DELE : A1)","19강_Part 1/4 간접목적격 대명사 형태 및 기본 어순 (DELE : A2 이상)","19강_Part 2/4 목적격대명사 결합 (간접+ 직접) & 연습 (DELE : A2 이상)","19강_Part 3/4 목적격대명사 어순 예외 & 중복형 (DELE : A2 이상)","19강_Part 4/4 [간접/직접] 목적격대명사 정리문제 (DELE : A1)","20강_Part 1/4. Gustar동사: 의미 & 문장구조 (DELE : A1)","20강_Part 2/4. Gustar동사: 문장 & 중복형 (DELE : A1)","20강_Part 3/4. [ Gustar/ Encantar/ Preferir ] 다양한 '좋아하다' 동사 (DELE : A1)"]}];

let courses=JSON.parse(localStorage.getItem('lec_c3')||'null')||DEFAULTS;
let records=JSON.parse(localStorage.getItem('lec_r3')||'{}');
let weekOff=0;
let nextId=Math.max(0,...courses.map(c=>c.id))+1;
let newCi=1;

// dropdown state
let dpKey=null; // current date key
let dpSel={}; // "cid_ei" -> true

function save(){
  localStorage.setItem('lec_c3',JSON.stringify(courses));
  localStorage.setItem('lec_r3',JSON.stringify(records));
}

// ── Date utils ──
function getMonday(d){const dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));dt.setHours(0,0,0,0);return dt;}
function weekDates(){const m=getMonday(new Date());m.setDate(m.getDate()+weekOff*7);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function dk(d){return d.toISOString().slice(0,10);}
function fs(d){return `${d.getMonth()+1}/${d.getDate()}`;}

// ── Render week ──
function render(){
  const dates=weekDates(),todayKey=dk(new Date());
  document.getElementById('weekTitleText').textContent=`${dates[0].getFullYear()}년 ${dates[0].getMonth()+1}월`;
  document.getElementById('weekRange').textContent=`${fs(dates[0])} – ${fs(dates[6])}`;
  renderSummary(dates);
  applyGridLayout();
  const grid=document.getElementById('grid');grid.innerHTML='';
  dates.forEach((d,i)=>{
    const key=dk(d),isToday=key===todayKey;
    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':'');
    card.innerHTML=`
      <div class="day-head">
        <span class="day-name">${(LANGS[curLang]||LANGS.ko).days[i]}</span>
        <span class="day-num">${d.getDate()}</span>
      </div>
      <div class="tags-wrap" id="tags-${key}"></div>
      <div class="add-wrap" id="aw-${key}">
        <button class="add-btn" onclick="openDp('${key}',event)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
          추가
        </button>
      </div>`;
    grid.appendChild(card);
    renderTags(key);
  });
}

function renderSummary(dates){
  const el=document.getElementById('summary'),cnt={};
  dates.forEach(d=>(records[dk(d)]||[]).forEach(r=>{cnt[r.cid]=(cnt[r.cid]||0)+1;}));
  const total=Object.values(cnt).reduce((a,b)=>a+b,0);
  if(!total){el.innerHTML='';return;}
  let h=`<div class="summary-chip"><span>이번 주</span><span class="summary-count">${total}강</span></div>`;
  Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([cid,n])=>{
    const c=courses.find(x=>x.id==cid);if(!c)return;
    const col=PAL[c.ci%PAL.length];
    h+=`<div class="summary-chip"><span class="dot" style="background:${col.dot}"></span><span>${c.name}</span><span class="summary-count">${n}</span></div>`;
  });
  el.innerHTML=h;
}

function renderTags(key){
  const el=document.getElementById('tags-'+key);if(!el)return;
  el.innerHTML='';
  (records[key]||[]).forEach(r=>{
    const c=courses.find(x=>x.id===r.cid);if(!c)return;
    const col=PAL[c.ci%PAL.length],ep=c.episodes[r.ei]||'';
    const tag=document.createElement('div');
    tag.className='tag';tag.style.background=col.bg;tag.style.color=col.text;
    const tipText=`[${c.name}]\n${ep}`;
    tag.innerHTML=`<span class="tag-text">${ep}</span><button class="tag-del" onclick="removeRec('${key}',${r.cid},${r.ei})">×</button>`;
    tag.addEventListener('mouseenter',e=>showTip(e,tipText));
    tag.addEventListener('mousemove',moveTip);
    tag.addEventListener('mouseleave',hideTip);
    el.appendChild(tag);
  });
}

// ── Dropdown ──
function openDp(key,e){
  e.stopPropagation();
  if(dpKey===key){closeDp();return;}
  dpKey=key; dpSel={};
  (records[key]||[]).forEach(r=>{dpSel[`${r.cid}_${r.ei}`]=true;});

  const aw=document.getElementById('aw-'+key);
  const rect=aw.getBoundingClientRect();
  const dp=document.getElementById('globalDp');
  const margin=8; // 화면 끝에서 최소 여백

  // 좌우 위치
  let left=rect.left;
  if(left+310>window.innerWidth-margin) left=window.innerWidth-310-margin;
  if(left<margin) left=margin;
  dp.style.left=left+'px';

  // 위/아래 공간 계산
  const spaceBelow=window.innerHeight-rect.bottom-margin;
  const spaceAbove=rect.top-margin;
  const minHeight=200; // 최소 이 높이는 확보

  if(spaceBelow>=minHeight){
    // 아래로 펼침 — 남은 공간만큼만 사용
    dp.style.top=(rect.bottom+4)+'px';
    dp.style.bottom='';
    dp.style.maxHeight=spaceBelow+'px';
  } else if(spaceAbove>=minHeight){
    // 위로 펼침 — 남은 공간만큼만 사용
    dp.style.bottom=(window.innerHeight-rect.top+4)+'px';
    dp.style.top='';
    dp.style.maxHeight=spaceAbove+'px';
  } else {
    // 공간이 양쪽 다 부족하면 더 넓은 쪽으로
    if(spaceBelow>=spaceAbove){
      dp.style.top=(rect.bottom+4)+'px';
      dp.style.bottom='';
      dp.style.maxHeight=spaceBelow+'px';
    } else {
      dp.style.bottom=(window.innerHeight-rect.top+4)+'px';
      dp.style.top='';
      dp.style.maxHeight=spaceAbove+'px';
    }
  }

  document.getElementById('dpSearchInput').value='';
  document.getElementById('dpSearchClear').classList.remove('show');
  buildDpContent('');
  dp.classList.add('open');
}

function closeDp(){
  document.getElementById('globalDp').classList.remove('open');
  dpKey=null; dpSel={};
}

function onDpSearch(q){
  document.getElementById('dpSearchClear').classList.toggle('show',q.length>0);
  buildDpContent(q);
}
function clearDpSearch(){
  document.getElementById('dpSearchInput').value='';
  document.getElementById('dpSearchClear').classList.remove('show');
  buildDpContent('');
}

function buildDpContent(q){
  const scroll=document.getElementById('dpScroll');
  scroll.innerHTML='';
  courses.forEach(c=>{
    const col=PAL[c.ci%PAL.length];
    const eps=c.episodes.map((ep,ei)=>({ep,ei})).filter(({ep})=>!q||ep.includes(q)||c.name.includes(q));
    if(!eps.length)return;

    // checked count for this course
    const checkedInCourse=eps.filter(({ei})=>dpSel[`${c.id}_${ei}`]).length;

    const block=document.createElement('div');
    block.className='dp-course';
    const head=document.createElement('div');
    head.className='dp-course-head'+(q?' open':''); // auto-open when searching
    head.innerHTML=`
      <span class="dp-course-dot" style="background:${col.dot}"></span>
      <span class="dp-course-label">${c.name}</span>
      <span class="dp-course-meta" id="dpcm-${c.id}">${checkedInCourse?checkedInCourse+'개 선택 · ':''} ${eps.length}강</span>
      <span class="dp-course-arrow">▾</span>`;
    head.onclick=()=>{
      head.classList.toggle('open');
      epList.classList.toggle('open');
    };

    const epList=document.createElement('div');
    epList.className='dp-ep-list'+(q?' open':'');
    eps.forEach(({ep,ei})=>{
      const selKey=`${c.id}_${ei}`;
      const checked=!!dpSel[selKey];
      const item=document.createElement('div');
      item.className='dp-ep-item'+(checked?' checked':'');
      item.id=`dpei-${c.id}-${ei}`;
      item.innerHTML=`
        <span class="ep-num-badge">${ei+1}</span>
        <div class="ep-cb"><span class="ep-cb-tick">✓</span></div>
        <span class="ep-label">${ep}</span>`;
      item.onclick=()=>toggleEp(c.id,ei,selKey);
      epList.appendChild(item);
    });

    block.appendChild(head);block.appendChild(epList);
    scroll.appendChild(block);
  });
  updateSelLabel();
}

function toggleEp(cid,ei,selKey){
  if(dpSel[selKey])delete dpSel[selKey]; else dpSel[selKey]=true;
  const item=document.getElementById(`dpei-${cid}-${ei}`);
  if(item)item.classList.toggle('checked',!!dpSel[selKey]);
  // update course meta count
  const c=courses.find(x=>x.id===cid);
  if(c){
    const cnt=c.episodes.reduce((a,_,i)=>(dpSel[`${cid}_${i}`]?a+1:a),0);
    const meta=document.getElementById('dpcm-'+cid);
    if(meta)meta.textContent=`${cnt?cnt+'개 선택 · ':''}${c.episodes.length}강`;
  }
  updateSelLabel();
}

function updateSelLabel(){
  const cnt=Object.keys(dpSel).length;
  const el=document.getElementById('dpSelLabel');
  el.textContent=cnt?`${cnt}개 선택됨`:'';
}

function confirmDp(){
  if(!dpKey)return;
  const existing=(records[dpKey]||[]).map(r=>`${r.cid}_${r.ei}`);
  const toAdd=Object.keys(dpSel).filter(k=>!existing.includes(k));
  const added=toAdd.map(k=>{const[cid,ei]=k.split('_');return{cid:parseInt(cid),ei:parseInt(ei)};});
  records[dpKey]=[...(records[dpKey]||[]),...added];
  save();
  const key=dpKey;
  closeDp();
  renderTags(key);
  renderSummary(weekDates());
  if(added.length)toast(`${added.length}강 추가 완료`);
}

function cancelDp(){closeDp();}

function removeRec(key,cid,ei){
  records[key]=(records[key]||[]).filter(r=>!(r.cid==cid&&r.ei==ei));
  save();renderTags(key);renderSummary(weekDates());
}

// ── 반응형 그리드 (JS로 실제 픽셀 기반 적용) ──
function applyGridLayout(){
  const w=window.innerWidth;
  const h=window.innerHeight;
  const isLandscape=w>h;
  const grid=document.getElementById('grid');
  const body=document.body;
  if(!grid)return;

  // 기존 클래스 초기화
  grid.classList.remove('cols-2','cols-4','cols-7');
  body.classList.remove('landscape-small');

  if(w>=1024){
    // PC / 넓은 태블릿
    grid.classList.add('cols-7');
  } else if(isLandscape && h<500){
    // 일반 폰 가로 (세로 500px 미만) → 7열 + UI 축소
    grid.classList.add('cols-7');
    body.classList.add('landscape-small');
  } else if(isLandscape && w>=460){
    // 폴드 펼침 가로 / 태블릿 가로 → 4열
    grid.classList.add('cols-4');
  } else if(!isLandscape && w>=600){
    // 폴드 펼침 세로 / 태블릿 세로 → 4열
    grid.classList.add('cols-4');
  } else if(!isLandscape && w>=380){
    // 폴드 접힘 / 중간 폰 세로 → 4열
    grid.classList.add('cols-4');
  } else {
    // 작은 폰 세로 → 2열
    grid.classList.add('cols-2');
  }
}

window.addEventListener('resize', applyGridLayout);
window.addEventListener('orientationchange', ()=>setTimeout(applyGridLayout, 100));

function renderEpList(c,container){
  container.innerHTML='';
  c.episodes.forEach((ep,i)=>{
    const row=document.createElement('div');

    row.id=`eprow-${c.id}-${i}`;
    row.draggable=true;
    row.innerHTML=`
      <span class="ep-drag" title="드래그해서 순서 변경">⠿</span>
      <span class="ep-n">${i+1}</span>

        <button class="ep-act-btn" onclick="editEpisode(${c.id},${i})" title="수정">✏️</button>
        <button class="ep-act-btn del" onclick="delEpisode(${c.id},${i})" title="삭제">×</button>
      </div>`;
    attachDrag(row,c,i,container);
    container.appendChild(row);
  });
}

let dragSrcCid=null,dragSrcEi=null;

function attachDrag(row,c,ei,container){
  row.addEventListener('dragstart',e=>{
    dragSrcCid=c.id; dragSrcEi=ei;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  row.addEventListener('dragend',()=>{
    container.querySelectorAll('.ep-row-m').forEach(r=>{
      r.classList.remove('dragging','drag-over');
    });
  });
  row.addEventListener('dragover',e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    container.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over'));
    if(dragSrcCid===c.id&&dragSrcEi!==ei) row.classList.add('drag-over');
  });
  row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
  row.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragSrcCid!==c.id||dragSrcEi===ei)return;
    // 순서 변경
    const course=courses.find(x=>x.id===c.id);
    if(!course)return;
    const moved=course.episodes.splice(dragSrcEi,1)[0];
    const toEi=ei>dragSrcEi?ei:ei;
    course.episodes.splice(toEi,0,moved);
    // records 인덱스도 재정렬
    const from=dragSrcEi,to=toEi;
    Object.keys(records).forEach(k=>{
      records[k]=(records[k]||[]).map(r=>{
        if(r.cid!==c.id)return r;
        if(r.ei===from)return{...r,ei:to};
        if(from<to&&r.ei>from&&r.ei<=to)return{...r,ei:r.ei-1};
        if(from>to&&r.ei>=to&&r.ei<from)return{...r,ei:r.ei+1};
        return r;
      });
    });
    save();
    renderEpList(course,container);
    document.getElementById('cscnt-'+c.id).textContent=`${course.episodes.length}강`;
    render();
  });
}

function toggleCS(head){
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('open');
}

function cycleColor(id){
  const c=courses.find(x=>x.id===id);if(!c)return;
  c.ci=(c.ci+1)%PAL.length;save();renderTabList();render();
}

function editCourseName(id){
  const c=courses.find(x=>x.id===id);if(!c)return;
  const nameEl=document.getElementById('csname-'+id);
  if(nameEl.querySelector('input'))return; // 이미 편집 중
  const cur=c.name;
  nameEl.innerHTML=`<input class="cs-name-input" id="csnameInput-${id}" value="${cur}" onclick="event.stopPropagation()">`;
  const inp=document.getElementById('csnameInput-'+id);
  inp.focus();inp.select();
  const save2=()=>{
    const val=inp.value.trim();
    if(val&&val!==cur){
      if(courses.find(x=>x.name===val&&x.id!==id)){toast('이미 있는 이름이에요');return;}
      c.name=val;save();render();toast('이름 수정 완료');
    }
    nameEl.textContent=c.name;
  };
  inp.onblur=save2;
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){nameEl.textContent=cur;}};
}

function delCourse(id){
  const c=courses.find(x=>x.id===id);
  if(!confirm(`"${c?.name}" 강의를 삭제할까요?\n수강 기록도 모두 삭제됩니다.`))return;
  courses=courses.filter(x=>x.id!==id);
  Object.keys(records).forEach(k=>{records[k]=(records[k]||[]).filter(r=>r.cid!==id);});
  save();renderTabList();render();
}

let _addingEp=false;
function addEpisode(cid){
  if(_addingEp)return;
  _addingEp=true;
  setTimeout(()=>_addingEp=false,300);
  const c=courses.find(x=>x.id===cid);if(!c)return;
  const inp=document.getElementById('epinput-'+cid);
  const val=inp.value.trim();
  if(!val){toast('에피소드 이름을 입력해주세요');return;}
  c.episodes.push(val);
  save();
  const container=document.getElementById('epinner-'+cid);
  renderEpList(c,container);
  document.getElementById('cscnt-'+cid).textContent=`${c.episodes.length}강`;
  render();
  toast('에피소드 추가 완료');
  // renderEpList 이후에 값 초기화 + 포커스 (DOM 재렌더 후 실행)
  setTimeout(()=>{
    const inp2=document.getElementById('epinput-'+cid);
    if(inp2){inp2.value='';inp2.focus();}
  },0);
}

function delEpisode(cid,ei){
  const c=courses.find(x=>x.id===cid);if(!c)return;
  if(!confirm(`"${c.episodes[ei]}" 삭제할까요?`))return;
  // 기록에서도 제거 (인덱스 재정렬)
  Object.keys(records).forEach(k=>{
    records[k]=(records[k]||[])
      .filter(r=>!(r.cid===cid&&r.ei===ei))
      .map(r=>r.cid===cid&&r.ei>ei?{...r,ei:r.ei-1}:r);
  });
  c.episodes.splice(ei,1);
  save();
  const container=document.getElementById('epinner-'+cid);
  renderEpList(c,container);
  document.getElementById('cscnt-'+cid).textContent=`${c.episodes.length}강`;
  render();
  toast('삭제 완료');
}

function editEpisode(cid,ei){
  const c=courses.find(x=>x.id===cid);if(!c)return;
  const textEl=document.getElementById(`eptext-${cid}-${ei}`);
  if(!textEl)return;
  if(textEl.tagName==='INPUT')return;
  const cur=c.episodes[ei];
  const inp=document.createElement('input');
  inp.className='ep-text-input';
  inp.value=cur;
  textEl.replaceWith(inp);
  inp.focus();inp.select();
  const done=()=>{
    const val=inp.value.trim()||cur;
    c.episodes[ei]=val;
    save();render();
    const span=document.createElement('span');
    span.className='ep-text';
    span.id=`eptext-${cid}-${ei}`;
    span.textContent=val;
    inp.replaceWith(span);
    if(val!==cur)toast('수정 완료');
  };
  inp.onblur=done;
  inp.onkeydown=e=>{
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){inp.value=cur;inp.blur();}
  };
}

function addCourse(){

// ── Calendar ──
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let calOpen=false;

function toggleCal(e){
  e.stopPropagation();
  const popup=document.getElementById('calPopup');
  if(calOpen){closeCal();return;}
  // 현재 보고 있는 주의 월로 캘린더 초기화
  const dates=weekDates();
  calYear=dates[0].getFullYear();
  calMonth=dates[0].getMonth();
  buildCal();
  // 위치 설정
  const btn=document.getElementById('weekTitle');
  const rect=btn.getBoundingClientRect();
  popup.style.left=Math.min(rect.left,window.innerWidth-296)+'px';
  const spaceBelow=window.innerHeight-rect.bottom;
  if(spaceBelow>=320){
    popup.style.top=(rect.bottom+6)+'px';
    popup.style.bottom='';
  } else {
    popup.style.bottom=(window.innerHeight-rect.top+6)+'px';
    popup.style.top='';
  }
  popup.classList.add('open');
  calOpen=true;
}

function closeCal(){
  document.getElementById('calPopup').classList.remove('open');
  calOpen=false;
}

function calChangeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  buildCal();
}

function calGoToday(){
  weekOff=0;
  const today=new Date();
  calYear=today.getFullYear();
  calMonth=today.getMonth();
  buildCal();
  render();
  closeCal();
}

function buildCal(){
  const days=(LANGS[curLang]||LANGS.ko).days;
  const dn=document.getElementById('calDayNames');
  if(dn)dn.innerHTML=days.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  const monthFmt=curLang==='ko'?`${calYear}년 ${calMonth+1}월`:
    curLang==='ja'?`${calYear}年${calMonth+1}月`:
    curLang==='zh'?`${calYear}年${calMonth+1}月`:
    new Date(calYear,calMonth,1).toLocaleDateString(curLang==='es'?'es-ES':curLang==='en'?'en-US':'ko-KR',{year:'numeric',month:'long'});
  document.getElementById('calMonthLabel').textContent=monthFmt;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';

  const todayKey=dk(new Date());
  const weekDays=weekDates().map(d=>dk(d));

  // 이번 달 1일의 요일 (월요일=0 기준)
  const firstDay=new Date(calYear,calMonth,1);
  let startDow=firstDay.getDay()-1; // 0=월
  if(startDow<0)startDow=6; // 일요일이면 6

  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const prevLastDate=new Date(calYear,calMonth,0).getDate();

  // 이전 달 날짜들
  for(let i=startDow-1;i>=0;i--){
    const d=new Date(calYear,calMonth-1,prevLastDate-i);
    grid.appendChild(makeCalCell(d,true,todayKey,weekDays));
  }
  // 이번 달
  for(let i=1;i<=lastDate;i++){
    const d=new Date(calYear,calMonth,i);
    grid.appendChild(makeCalCell(d,false,todayKey,weekDays));
  }
  // 다음 달 날짜들 (6주 채우기)
  const total=startDow+lastDate;
  const remainder=total%7===0?0:7-(total%7);
  for(let i=1;i<=remainder;i++){
    const d=new Date(calYear,calMonth+1,i);
    grid.appendChild(makeCalCell(d,true,todayKey,weekDays));
  }
}

function makeCalCell(d,otherMonth,todayKey,weekDays){
  const key=dk(d);
  const btn=document.createElement('button');
  btn.className='cal-cell';
  if(otherMonth)btn.classList.add('other-month');
  if(key===todayKey)btn.classList.add('today');
  if(weekDays.includes(key))btn.classList.add('in-week');
  if(records[key]&&records[key].length>0)btn.classList.add('has-record');
  btn.textContent=d.getDate();
  btn.onclick=()=>calSelectDate(d);
  return btn;
}

function calSelectDate(d){
  // 선택한 날짜가 포함된 주로 이동
  const mon=getMonday(new Date());
  const selMon=getMonday(d);
  weekOff=Math.round((selMon-mon)/(7*24*60*60*1000));
  render();
  // 캘린더 갱신 (in-week 표시 업데이트)
  const weekDays=weekDates().map(x=>dk(x));
  calYear=d.getFullYear();
  calMonth=d.getMonth();
  buildCal();
  closeCal();
}

const THEME_KEY='lec_theme';
function initTheme(){
  const saved=localStorage.getItem(THEME_KEY);
  if(saved==='dark')document.body.classList.add('dark');
  else if(saved==='light')document.body.classList.add('light');
  updateThemeIcon();
}
function toggleTheme(){
  const isDark=document.body.classList.contains('dark')||
    (!document.body.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  if(isDark){
    document.body.classList.remove('dark');document.body.classList.add('light');
    localStorage.setItem(THEME_KEY,'light');
  } else {
    document.body.classList.remove('light');document.body.classList.add('dark');
    localStorage.setItem(THEME_KEY,'dark');
  }
  updateThemeIcon();
}
function updateThemeIcon(){
  const isDark=document.body.classList.contains('dark')||
    (!document.body.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  const icon=document.getElementById('themeIcon');
  if(!icon)return;
  // 다크면 태양(라이트로 바꾸기), 라이트면 달(다크로 바꾸기)
  if(isDark){
    icon.innerHTML='<path d="M8 3V1M8 15v-2M3 8H1M15 8h-2M4.22 4.22L2.81 2.81M13.19 13.19l-1.41-1.41M4.22 11.78l-1.41 1.41M13.19 2.81l-1.41 1.41M11 8a3 3 0 11-6 0 3 3 0 016 0z"/>';
  } else {
    icon.innerHTML='<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" transform="translate(-4,-1) scale(1.1)"/>';
  }
}

// ── Tooltip ──
const tipEl=document.getElementById('tip');
let tipTimer;
function showTip(e,text){
  clearTimeout(tipTimer);
  tipEl.textContent=text;
  moveTip(e);
  tipTimer=setTimeout(()=>tipEl.classList.add('show'),180);
}
function moveTip(e){
  const pad=14,tw=tipEl.offsetWidth||260,th=tipEl.offsetHeight||40;
  let x=e.clientX+pad,y=e.clientY+pad;
  if(x+tw>window.innerWidth-8)x=e.clientX-tw-pad;
  if(y+th>window.innerHeight-8)y=e.clientY-th-pad;
  tipEl.style.left=x+'px';tipEl.style.top=y+'px';
}
function hideTip(){clearTimeout(tipTimer);tipEl.classList.remove('show');}
